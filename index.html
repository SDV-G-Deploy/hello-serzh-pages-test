<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, Serzh!</title>
  <style>
    :root { --text:#f8fafc; --accent:#38bdf8; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Inter,-apple-system,Segoe UI,Roboto,sans-serif; background:radial-gradient(circle at top left,#334155 0%,#0f172a 45%,#020617 100%); color:var(--text);} 
    .card { width:min(92vw,620px); border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); border-radius:20px; padding:28px; box-shadow:0 18px 40px rgba(0,0,0,.35);} 
    table { width:100%; border-collapse:collapse; border:1px solid rgba(255,255,255,.18); border-radius:14px; overflow:hidden; }
    th,td { padding:18px; text-align:center; border-bottom:1px solid rgba(255,255,255,.14); font-size:clamp(18px,2.8vw,26px); }
    th { background:linear-gradient(135deg,rgba(56,189,248,.35),rgba(99,102,241,.35)); font-weight:700; }
    td { font-weight:600; }
    tr:last-child td { border-bottom:0; }
    .sparkle { color:var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <table>
      <tr><th>💫 Greeting</th></tr>
      <tr><td>Hello, Serzh! <span class="sparkle">;)</span></td></tr>
    </table>
  </div>
</body>
</html>
