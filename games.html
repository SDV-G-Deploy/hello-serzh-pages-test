<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Снежана ⚡ — Games</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .games-head { margin-bottom: 16px; }
    .games-subtitle { margin: 0; color: var(--muted); }

    .games-toolbar {
      margin: 14px 0 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .games-toolbar strong { font-size: 14px; color: #e2e8f0; }

    .filter-btn {
      appearance: none;
      border: 1px solid var(--line);
      color: white;
      background: rgba(255,255,255,.06);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: .16s ease;
    }
    .filter-btn:hover { background: rgba(255,255,255,.12); }
    .filter-btn.active {
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      border-color: transparent;
      box-shadow: 0 6px 16px rgba(56,189,248,.25);
    }

    .games-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      margin-top: 14px;
    }
    @media (min-width: 760px) {
      .games-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }

    .game-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: rgba(255,255,255,.04);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .game-title { margin: 0; font-size: 20px; line-height: 1.2; }
    .game-subtitle { margin: 4px 0 0; color: #dbeafe; font-size: 13px; }
    .game-desc { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.45; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 9px;
      border: 1px solid rgba(255,255,255,.24);
      font-weight: 700;
    }
    .status-playable { background: rgba(16,185,129,.2); color: #86efac; }
    .status-prototype { background: rgba(245,158,11,.2); color: #fcd34d; }
    .status-polish { background: rgba(56,189,248,.2); color: #7dd3fc; }

    .game-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-flex;
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      color: #cbd5e1;
      background: rgba(255,255,255,.03);
    }

    .game-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
    .action-btn {
      appearance: none;
      border: 1px solid var(--line);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 14px;
      transition: .16s ease;
    }
    .action-btn.primary {
      border-color: transparent;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
    }
    .action-btn.secondary { background: rgba(255,255,255,.05); }
    .action-btn:hover { transform: translateY(-1px); }

    .game-empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <nav>
      <a href="./index.html">Home</a>
      <a href="./about.html">About</a>
      <a href="./projects.html">Projects</a>
      <a class="active" href="./games.html">Games</a>
      <a href="./clickable-clouds.html">Clouds</a>
            <a href="./for-lenochka.html">FOR LENOCHKA</a>
<a href="./notes.html">Notes</a>
    </nav>

    <section class="card">
      <div class="games-head">
        <h1>Games</h1>
        <p class="games-subtitle">Подборка игровых прототипов и мини-игр с аккуратным каталогом и быстрыми ссылками.</p>
      </div>

      <div class="games-toolbar">
        <strong>Фильтр:</strong>
        <button class="filter-btn" data-filter="all" type="button">Все</button>
        <button class="filter-btn" data-filter="playable" type="button">Playable</button>
        <button class="filter-btn" data-filter="prototype" type="button">Prototype</button>
        <button class="filter-btn" data-filter="polish" type="button">Polish</button>
      </div>

      <div id="gamesGrid" class="games-grid"></div>
      <div id="gamesEmpty" class="game-empty">По этому фильтру пока нет игр.</div>
    </section>
  </main>

  <script>
    const statusLabel = {
      playable: 'playable',
      prototype: 'prototype',
      polish: 'polish'
    };

    const games = [
      {
        title: 'Tap Window Rush',
        subtitle: 'One-Tap Timing Sprint',
        shortDescription: '45 секунд тайминга: попадай в safe-window, держи streak и улучшай best.',
        playUrl: './demos/tap-window-rush/index.html',
        repoUrl: '',
        tags: ['mobile-first', 'one-tap', 'timing'],
        status: 'playable'
      },
      {
        title: 'Merge Sprint 45',
        subtitle: 'Arcade Merge Challenge',
        shortDescription: '45 секунд на быстрые merge-решения: кликай ячейки, собирай цепочки, ставь рекорд.',
        playUrl: './demos/merge-sprint-45/index.html',
        repoUrl: '',
        tags: ['arcade', 'merge', 'speedrun'],
        status: 'playable'
      },
      {
        title: 'Drift Dot',
        subtitle: 'One-Touch Survival',
        shortDescription: 'Удерживай и отпускай в нужный момент, чтобы выжить в узких движущихся коридорах.',
        playUrl: './demos/drift-dot/index.html',
        repoUrl: '',
        tags: ['survival', 'one-touch', 'timing'],
        status: 'playable'
      },
      {
        title: 'Pulse Catcher',
        subtitle: 'Rhythm Tap Loop',
        shortDescription: 'Ритм на 45 секунд: лови тайминг, собирай стрик, поднимай множитель очков.',
        playUrl: './demos/pulse-catcher/index.html',
        repoUrl: '',
        tags: ['rhythm', 'tap', 'streak'],
        status: 'playable'
      },
      {
        title: 'Lane Surfer',
        subtitle: 'Mobile Lane Runner',
        shortDescription: 'Быстрый раннер на 30 секунд: уклоняйся от препятствий и держи комбо.',
        playUrl: './demos/lane-surfer/index.html',
        repoUrl: '',
        tags: ['runner', 'mobile', 'combo'],
        status: 'playable'
      },
      {
        title: 'Fair Shot Arena',
        subtitle: 'Duel Fairness Prototype',
        shortDescription: 'Мини-дуэль с RNG для сравнения режимов и ощущения честности в бою.',
        playUrl: './demos/fair-shot-arena/index.html',
        repoUrl: '',
        tags: ['duel', 'rng', 'prototype'],
        status: 'playable'
      },
      {
        title: 'Daily Tower Seed',
        subtitle: 'Daily Challenge',
        shortDescription: 'Общий challenge дня для всех: 3 попытки, единый seed, короткий loop.',
        playUrl: './demos/daily-tower-seed/index.html',
        repoUrl: '',
        tags: ['daily', 'challenge', 'score'],
        status: 'playable'
      },
      {
        title: 'Thumb Orbit',
        subtitle: 'One-Thumb Orbit Survival',
        shortDescription: 'Mobile-first выживание одной рукой: удерживай направление и проходи дольше.',
        playUrl: './demos/thumb-orbit/index.html',
        repoUrl: '',
        tags: ['mobile-first', 'one-thumb', 'survival'],
        status: 'playable'
      },
      {
        title: 'Signal Dash',
        subtitle: 'Fast Dodge & Collect',
        shortDescription: '30-секундный рывок: уклоняйся, собирай сигналы и улучшай best run.',
        playUrl: './mini-game.html',
        repoUrl: 'https://github.com/SDV-G-Deploy/hello-serzh-pages-test',
        tags: ['mini-game', 'dodge', 'collect'],
        status: 'playable'
      },
      {
        title: 'Neon Streets: Panic Run',
        subtitle: 'Cyberpunk Prototype',
        shortDescription: 'Экспериментальный неон-ран в киберпанк-атмосфере с короткими сессиями.',
        playUrl: 'https://sdv-g-deploy.github.io/Git_root_CYBER_PUNK_PAN_K/',
        repoUrl: 'https://github.com/SDV-G-Deploy/Git_root_CYBER_PUNK_PAN_K',
        tags: ['cyberpunk', 'prototype', 'atmosphere'],
        status: 'prototype'
      },
      {
        title: 'Sprite Legends',
        subtitle: 'Retro Luck Adventure',
        shortDescription: 'Ретро-стиль и элемент удачи: короткие попытки с быстрым перезапуском.',
        playUrl: 'https://sdv-g-deploy.github.io/SpriteLegends/SpriteLegends/',
        repoUrl: 'https://github.com/SDV-G-Deploy/SpriteLegends',
        tags: ['retro', 'luck', 'arcade'],
        status: 'playable'
      },
      {
        title: 'Open Cosmo',
        subtitle: 'Space Arcade Draft',
        shortDescription: 'Лёгкий космо-аркадный прототип с фокусом на понятный loop и pacing.',
        playUrl: 'https://sdv-g-deploy.github.io/Open-Cosmo-Game/',
        repoUrl: 'https://github.com/SDV-G-Deploy/Open-Cosmo-Game',
        tags: ['space', 'arcade', 'prototype'],
        status: 'playable'
      },
      {
        title: 'Rat Above Test',
        subtitle: 'Mechanics Sandbox',
        shortDescription: 'Технический sandbox для проверки core-механик и баланса сложности.',
        playUrl: 'https://sdv-g-deploy.github.io/Test-Rat-Above/',
        repoUrl: 'https://github.com/SDV-G-Deploy/Test-Rat-Above',
        tags: ['sandbox', 'test', 'prototype'],
        status: 'prototype'
      },
      {
        title: 'Arm Rat Prototype',
        subtitle: 'Family Mini-Game Concept',
        shortDescription: 'Прототип мини-игры для коротких детских сессий и простого обучения.',
        playUrl: 'https://sdv-g-deploy.github.io/Arm-rat-proto/',
        repoUrl: 'https://github.com/SDV-G-Deploy/Arm-rat-proto',
        tags: ['family', 'mini-game', 'prototype'],
        status: 'prototype'
      },
      {
        title: 'Indie Test Arena',
        subtitle: 'Indie Mechanics Playground',
        shortDescription: 'Песочница для тестов инди-механик, идеи из планирования и быстрой итерации.',
        playUrl: 'https://sdv-g-deploy.github.io/Ind-Test-Ind-Game/',
        repoUrl: 'https://github.com/SDV-G-Deploy/Ind-Test-Ind-Game',
        tags: ['indie', 'playground', 'iteration'],
        status: 'playable'
      }
    ];

    const grid = document.getElementById('gamesGrid');
    const empty = document.getElementById('gamesEmpty');
    const filterButtons = [...document.querySelectorAll('[data-filter]')];

    function toStatusClass(status) {
      if (status === 'prototype') return 'status-prototype';
      if (status === 'polish') return 'status-polish';
      return 'status-playable';
    }

    function gameCard(game) {
      const tags = (game.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');
      const repoBtn = game.repoUrl
        ? `<a class="action-btn secondary" href="${game.repoUrl}" target="_blank" rel="noreferrer">Репозиторий</a>`
        : '';

      return `
        <article class="game-card" data-status="${game.status}">
          <div class="game-top">
            <div>
              <h2 class="game-title">${game.title}</h2>
              <p class="game-subtitle">${game.subtitle || ''}</p>
            </div>
            <span class="status-badge ${toStatusClass(game.status)}">${statusLabel[game.status] || game.status}</span>
          </div>
          <p class="game-desc">${game.shortDescription || ''}</p>
          <div class="game-tags">${tags}</div>
          <div class="game-actions">
            <a class="action-btn primary" href="${game.playUrl}" target="_blank" rel="noreferrer">Играть</a>
            ${repoBtn}
          </div>
        </article>
      `;
    }

    function renderGames(filter = 'all') {
      const visible = games.filter(game => filter === 'all' || game.status === filter);
      grid.innerHTML = visible.map(gameCard).join('');
      empty.style.display = visible.length ? 'none' : 'block';

      filterButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
    }

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => renderGames(btn.dataset.filter));
    });

    renderGames('all');
  </script>
</body>
</html>
