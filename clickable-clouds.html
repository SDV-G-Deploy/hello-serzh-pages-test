<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Снежана ⚡ — Нажимаемые облачка</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .cloud-page{display:grid;gap:14px}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
    .stats{display:flex;gap:8px;flex-wrap:wrap}
    .round-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;position:relative}
    .round-fill{height:100%;width:0%;background:linear-gradient(90deg,#22d3ee,#34d399);transition:width .2s ease}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    .pill{display:inline-block;padding:5px 10px;border:1px solid rgba(255,255,255,.22);border-radius:999px;background:rgba(255,255,255,.06);font-size:14px}
    .pill strong{display:inline-block;transform:translateZ(0)}
    .pill.bump strong{animation:hud-bump .26s ease-out}
    .pill.combo-hot{box-shadow:0 0 0 1px rgba(250,204,21,.5),0 0 14px rgba(250,204,21,.24)}

    .btn{appearance:none;border:1px solid rgba(255,255,255,.25);color:white;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer}
    .btn.subtle{background:rgba(255,255,255,.08);font-weight:600}
    .btn[aria-pressed="true"]{background:linear-gradient(135deg,#22c55e,#16a34a)}
    .btn.cta{background:linear-gradient(135deg,#f59e0b,#ef4444)}
    .btn.hidden{display:none}

    .cloud-scene{
      position:relative;
      min-height:58svh;
      border:1px solid rgba(255,255,255,.2);
      border-radius:16px;
      background:
        radial-gradient(80% 50% at 50% 0%, rgba(255,255,255,.08), transparent 60%),
        linear-gradient(180deg, rgba(147,197,253,.1), rgba(99,102,241,.06));
      overflow:hidden;
      isolation:isolate;
      touch-action:manipulation;
    }

    .cloud{
      position:absolute;
      border:none;
      color:#eef6ff;
      text-shadow:0 1px 2px rgba(45,56,86,.28);
      font-weight:700;
      border-radius:999px;
      cursor:pointer;
      will-change:transform,opacity,filter;
      box-shadow:
        0 12px 24px rgba(15, 23, 42, .26),
        0 6px 10px rgba(59, 130, 246, .12),
        inset 0 -12px 18px rgba(99, 102, 241, .14),
        inset 0 14px 16px rgba(255,255,255,.35);
      transition:filter .25s ease, transform .25s ease, opacity .25s ease;
      animation:drift var(--dur,11s) ease-in-out infinite;
      animation-delay:var(--delay,0s);
      background:
        radial-gradient(80% 90% at 25% 20%, rgba(255,255,255,.85), rgba(255,255,255,.35) 45%, transparent 75%),
        radial-gradient(140% 130% at 35% 20%, rgba(255,255,255,.9), rgba(224,236,255,.9) 48%, rgba(192,214,255,.8) 72%, rgba(173,199,255,.55) 100%);
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }
    .cloud::before,
    .cloud::after{
      content:"";
      position:absolute;
      border-radius:50%;
      background:inherit;
      box-shadow:inherit;
      z-index:-1;
    }
    .cloud::before{width:44%;height:70%;left:9%;top:-30%}
    .cloud::after{width:39%;height:60%;right:11%;top:-26%}

    .cloud:focus-visible{outline:2px solid #fff; outline-offset:2px}
    .cloud.pop{animation:click-pop .36s cubic-bezier(.2,.9,.25,1.2), drift var(--dur,11s) ease-in-out infinite}
    .cloud.bursting{animation:cloud-burst .46s ease forwards;pointer-events:none}
    .cloud.hidden{opacity:0;visibility:hidden;pointer-events:none}

    .flash{
      position:absolute;
      width:96px;height:96px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(254,243,199,.95) 0%, rgba(251,191,36,.58) 28%, rgba(250,204,21,.2) 52%, transparent 74%);
      transform:translate(-50%,-50%) scale(.6);
      pointer-events:none;
      mix-blend-mode:screen;
      animation:flash .24s ease-out forwards;
    }

    .bolt{
      position:absolute;
      width:16px;height:34px;
      transform:translate(-50%,-70%);
      background:linear-gradient(180deg, #fef3c7, #fde047 45%, #f59e0b 100%);
      clip-path:polygon(45% 0, 100% 0, 60% 45%, 84% 45%, 28% 100%, 42% 60%, 12% 60%);
      filter:drop-shadow(0 0 8px rgba(250,204,21,.8));
      pointer-events:none;
      animation:bolt .28s ease-out forwards;
    }

    .float-score{
      position:absolute;
      transform:translate(-50%, -50%);
      font-weight:800;
      font-size:14px;
      letter-spacing:.2px;
      color:#fef9c3;
      text-shadow:0 2px 8px rgba(15,23,42,.45);
      pointer-events:none;
      animation:float-score .62s ease-out forwards;
      z-index:3;
    }
    .float-score.bonus{color:#facc15;font-size:15px}

    @keyframes drift{
      0%,100%{transform:translate3d(0,0,0)}
      25%{transform:translate3d(var(--dx,8px),-8px,0)}
      50%{transform:translate3d(calc(var(--dx,8px) * -1),4px,0)}
      75%{transform:translate3d(calc(var(--dx,8px) * .6),-6px,0)}
    }
    @keyframes click-pop{
      0%{transform:scale(1) translateY(0)}
      35%{transform:scale(1.08) translateY(-4px)}
      70%{transform:scale(.985) translateY(1px)}
      100%{transform:scale(1) translateY(0)}
    }
    @keyframes cloud-burst{
      0%{opacity:1; transform:scale(1)}
      40%{opacity:.95; transform:scale(1.14)}
      100%{opacity:0; transform:scale(.6)}
    }
    @keyframes flash{
      from{opacity:.95;transform:translate(-50%,-50%) scale(.6)}
      to{opacity:0;transform:translate(-50%,-50%) scale(1.25)}
    }
    @keyframes bolt{
      from{opacity:.98;transform:translate(-50%,-70%) scale(1)}
      to{opacity:0;transform:translate(-50%,-70%) scale(1.2)}
    }
    @keyframes float-score{
      0%{opacity:0;transform:translate(-50%,-38%) scale(.86)}
      18%{opacity:1}
      100%{opacity:0;transform:translate(-50%,-170%) scale(1.05)}
    }
    @keyframes hud-bump{
      0%{transform:translateY(0) scale(1);opacity:1}
      35%{transform:translateY(-2px) scale(1.08);opacity:1}
      100%{transform:translateY(0) scale(1);opacity:1}
    }

    .sr-live{position:absolute;left:-9999px}

    @media (prefers-reduced-motion: reduce){
      .cloud{animation:none;transition:none}
      .cloud.pop,.cloud.bursting{animation:none}
      .flash,.bolt{display:none}
      .pill.bump strong{animation:none}
    }

    @media (max-width:720px){
      .cloud-scene{min-height:64svh}
      .pill{font-size:13px}
    }
  </style>
</head>
<body>
<main class="container">
  <nav>
    <a href="./index.html">Home</a>
    <a href="./about.html">About</a>
    <a href="./projects.html">Projects</a>
    <a href="./games.html">GaMeS</a>
    <a class="active" href="./clickable-clouds.html">Clouds</a>
    <a href="./notes.html">Notes</a>
  </nav>

  <section class="card cloud-page">
    <h1>Нажимаемые облачка ☁️</h1>
    <p>Тапай по облачкам. Формула очков: <strong>+10 × combo</strong> за клик и <strong>+35 × combo</strong> за лопание на 3-м клике.</p>

    <div class="toolbar">
      <div class="stats" aria-live="polite" id="hud">
        <span class="pill" id="scorePill">Score: <strong id="score">0</strong></span>
        <span class="pill" id="comboPill">Combo: <strong id="combo">0</strong></span>
        <span class="pill">Best: <strong id="best">0</strong></span>
        <span class="pill">Best Combo: <strong id="bestCombo">0</strong></span>
        <span class="pill" id="questPill">Quest: <strong id="quest">0/5</strong> · <strong id="timer">30s</strong></span>
      </div>
      <div class="controls">
        <button class="btn subtle" id="soundBtn" type="button" aria-pressed="false">🔇 Sound Off</button>
        <button class="btn subtle" id="resetBestBtn" type="button" title="Удерживай для сброса рекорда">Reset Best</button>
        <button class="btn" id="shuffleBtn" type="button">Перемешать облака</button>
        <button class="btn cta hidden" id="againBtn" type="button">Ещё раунд ⚡</button>
      </div>
    </div>

    <div class="round-bar" aria-hidden="true"><div class="round-fill" id="roundFill"></div></div>
    <div class="cloud-scene" id="scene" aria-label="Игровое поле с облаками"></div>
    <div class="sr-live" aria-live="polite" id="liveRegion"></div>
  </section>
</main>

<script>
(() => {
  const scene = document.getElementById('scene');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const bestEl = document.getElementById('best');
  const bestComboEl = document.getElementById('bestCombo');
  const scorePill = document.getElementById('scorePill');
  const comboPill = document.getElementById('comboPill');
  const liveRegion = document.getElementById('liveRegion');
  const questEl = document.getElementById('quest');
  const timerEl = document.getElementById('timer');
  const roundFill = document.getElementById('roundFill');
  const questPill = document.getElementById('questPill');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const soundBtn = document.getElementById('soundBtn');
  const resetBestBtn = document.getElementById('resetBestBtn');
  const againBtn = document.getElementById('againBtn');

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const BEST_KEY = 'clickableClouds.best.v2';
  const BEST_COMBO_KEY = 'clickableClouds.bestCombo.v1';
  const CLOUD_COUNT = 11;
  const CLOUD_TAP_LIMIT = 3;
  const RESPAWN_MS = 5000;
  const TAP_LOCK_MS = reducedMotion ? 80 : 260;
  const BASE_COMBO_WINDOW_MS = 1800;
  const MIN_COMBO_WINDOW_MS = 1200;
  const BASE_CLICK_POINTS = 10;
  const BASE_BURST_BONUS = 35;
  const ROUND_TARGET_BURSTS = 5;
  const ROUND_TIME_MS = 30000;
  const ROUND_REWARD = 300;

  let score = 0;
  let combo = 0;
  let best = Number(localStorage.getItem(BEST_KEY) || 0);
  let bestCombo = Number(localStorage.getItem(BEST_COMBO_KEY) || 0);
  let lastClickTs = 0;
  let gameStartTs = performance.now();
  let roundEndsAt = 0;
  let roundBursts = 0;
  let roundWon = false;

  let audioCtx = null;
  let soundEnabled = false;
  let resetBestHoldTimer = null;

  function rand(min, max){ return Math.random() * (max - min) + min; }
  function int(min, max){ return Math.floor(rand(min, max + 1)); }
  function clamp(v, min, max){ return Math.min(max, Math.max(min, v)); }

  function getDifficulty(){
    const elapsed = (performance.now() - gameStartTs) / 1000;
    const byTime = elapsed / 95;
    const byScore = score / 1200;
    return clamp((byTime + byScore) / 2, 0, 1);
  }

  function getComboWindowMs(){
    const t = getDifficulty();
    return BASE_COMBO_WINDOW_MS - (BASE_COMBO_WINDOW_MS - MIN_COMBO_WINDOW_MS) * t;
  }

  function pulsePill(pill){
    if (reducedMotion) return;
    pill.classList.remove('bump');
    void pill.offsetWidth;
    pill.classList.add('bump');
  }

  function updateHud(){
    scoreEl.textContent = String(score);
    comboEl.textContent = String(combo);
    bestEl.textContent = String(best);
    bestComboEl.textContent = String(bestCombo);

    comboPill.classList.toggle('combo-hot', combo >= 4);
    pulsePill(scorePill);
  }

  function updateBest(){
    if (score > best){
      best = score;
      localStorage.setItem(BEST_KEY, String(best));
      pulsePill(document.querySelector('.pill:last-child'));
    }
  }

  function ensureAudio(){
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      audioCtx = new Ctx();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, duration, gain, type = 'sine', sweep = 0){
    if (!soundEnabled) return;
    const ctx = ensureAudio();
    if (!ctx) return;

    const osc = ctx.createOscillator();
    const vol = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(60, freq + sweep), ctx.currentTime + duration);

    vol.gain.setValueAtTime(0.0001, ctx.currentTime);
    vol.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + 0.01);
    vol.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    osc.connect(vol);
    vol.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.02);
  }

  function playClickSfx(){
    playTone(520, 0.08, 0.018, 'triangle', -120);
  }

  function playBurstSfx(){
    playTone(280, 0.12, 0.022, 'sine', -80);
    playTone(680, 0.09, 0.012, 'triangle', -200);
  }

  function emitLightning(x, y){
    if (reducedMotion) return;

    const flash = document.createElement('span');
    flash.className = 'flash';
    flash.style.left = `${x}px`;
    flash.style.top = `${y}px`;

    const bolt = document.createElement('span');
    bolt.className = 'bolt';
    bolt.style.left = `${x + rand(-5, 5)}px`;
    bolt.style.top = `${y + rand(-6, 6)}px`;

    scene.append(flash, bolt);
    setTimeout(() => {
      flash.remove();
      bolt.remove();
    }, 320);
  }

  function emitScoreFloat(x, y, text, bonus = false){
    if (!text) return;
    const tag = document.createElement('span');
    tag.className = `float-score${bonus ? ' bonus' : ''}`;
    tag.style.left = `${x}px`;
    tag.style.top = `${y}px`;
    tag.textContent = text;
    scene.appendChild(tag);
    setTimeout(() => tag.remove(), 700);
  }

  function cloudTone(cloud){
    cloud.style.filter = `hue-rotate(${int(-10, 16)}deg) saturate(${rand(0.98, 1.16).toFixed(2)})`;
  }

  function setTapLock(cloud, isLocked){
    cloud.dataset.locked = isLocked ? '1' : '0';
  }

  function applyCloudDifficulty(cloud){
    const t = getDifficulty();
    const baseDur = Number(cloud.dataset.baseDur || 10);
    const dur = clamp(baseDur * (1 - 0.28 * t), 5.4, 14);
    const dxBase = Number(cloud.dataset.baseDx || 10);
    const dx = clamp(dxBase * (1 + 0.22 * t), 5, 20);
    cloud.style.setProperty('--dur', `${dur.toFixed(2)}s`);
    cloud.style.setProperty('--dx', `${Math.round(dx)}px`);
  }

  function burstAndRespawn(cloud){
    setTapLock(cloud, true);
    cloud.classList.remove('pop');
    cloud.classList.add('bursting');
    playBurstSfx();

    setTimeout(() => {
      cloud.classList.remove('bursting');
      cloud.classList.add('hidden');
      cloud.dataset.clickCount = '0';
      liveRegion.textContent = `${cloud.textContent} лопнуло. Возврат через 5 секунд`;

      setTimeout(() => {
        cloud.classList.remove('hidden');
        cloud.style.opacity = '1';
        cloud.style.transform = '';
        cloud.dataset.clickCount = '0';
        applyCloudDifficulty(cloud);
        setTapLock(cloud, false);
        liveRegion.textContent = `${cloud.textContent} вернулось`;
      }, RESPAWN_MS);
    }, reducedMotion ? 40 : 430);
  }

  function onCloudTap(ev){
    const cloud = ev.currentTarget;
    if (cloud.dataset.locked === '1' || cloud.classList.contains('hidden') || cloud.classList.contains('bursting')) return;

    setTapLock(cloud, true);
    startRoundIfNeeded();
    const now = performance.now();
    const comboWindow = getComboWindowMs();
    combo = (now - lastClickTs <= comboWindow) ? combo + 1 : 1;
    lastClickTs = now;

    const clickPoints = BASE_CLICK_POINTS * combo;
    score += clickPoints;
    if (combo > bestCombo){
      bestCombo = combo;
      localStorage.setItem(BEST_COMBO_KEY, String(bestCombo));
    }

    const rect = scene.getBoundingClientRect();
    const x = (ev.clientX || rect.left + cloud.offsetLeft + cloud.offsetWidth / 2) - rect.left;
    const y = (ev.clientY || rect.top + cloud.offsetTop + cloud.offsetHeight / 2) - rect.top;

    emitLightning(x, y);
    emitScoreFloat(x, y - 6, `+${clickPoints}`);
    cloudTone(cloud);
    playClickSfx();

    let localClickCount = Number(cloud.dataset.clickCount || '0') + 1;
    cloud.dataset.clickCount = String(localClickCount);

    cloud.classList.remove('pop');
    void cloud.offsetWidth;
    if (!reducedMotion) cloud.classList.add('pop');

    if (combo > 1) pulsePill(comboPill);

    if (localClickCount >= CLOUD_TAP_LIMIT){
      const burstBonus = BASE_BURST_BONUS * combo;
      score += burstBonus;
      roundBursts += 1;
      emitScoreFloat(x + rand(-12, 12), y - 20, `+${burstBonus} burst`, true);
      burstAndRespawn(cloud);
      liveRegion.textContent = `Combo x${combo}. +${clickPoints} и burst +${burstBonus}`;
      updateBest();
      updateHud();
      updateRoundHud();
      if (roundBursts >= ROUND_TARGET_BURSTS) finishRound();
      return;
    }

    applyCloudDifficulty(cloud);
    setTimeout(() => setTapLock(cloud, false), TAP_LOCK_MS);

    updateBest();
    updateHud();
    liveRegion.textContent = `Combo x${combo}. +${clickPoints} очков`;
  }


  function startRoundIfNeeded(){
    if (roundEndsAt) return;
    roundEndsAt = performance.now() + ROUND_TIME_MS;
    roundBursts = 0;
    roundWon = false;
    liveRegion.textContent = 'Раунд начался: лопни 5 облаков за 30 секунд';
  }

  function updateRoundHud(){
    const leftMs = roundEndsAt ? Math.max(0, roundEndsAt - performance.now()) : ROUND_TIME_MS;
    const sec = Math.ceil(leftMs / 1000);
    questEl.textContent = `${roundBursts}/${ROUND_TARGET_BURSTS}`;
    timerEl.textContent = `${sec}s`;
    const progress = roundEndsAt ? (leftMs / ROUND_TIME_MS) * 100 : 0;
    roundFill.style.width = `${progress}%`;
    questPill.classList.toggle('combo-hot', roundBursts >= ROUND_TARGET_BURSTS - 1 && !roundWon);
  }

  function finishRound(){
    if (!roundEndsAt) return;
    const success = roundBursts >= ROUND_TARGET_BURSTS;
    if (success && !roundWon){
      score += ROUND_REWARD;
      roundWon = true;
      updateBest();
      updateHud();
      liveRegion.textContent = `Квест выполнен! +${ROUND_REWARD} бонуса`;
    } else if (!success) {
      liveRegion.textContent = `Раунд окончен: ${roundBursts}/${ROUND_TARGET_BURSTS}. Жми ещё раунд!`;
    }
    roundEndsAt = 0;
    againBtn.classList.remove('hidden');
    updateRoundHud();
  }

  function createCloud(label){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cloud';
    btn.textContent = label;
    btn.setAttribute('aria-label', `Облачко ${label}`);
    btn.dataset.clickCount = '0';
    btn.dataset.locked = '0';
    btn.addEventListener('click', onCloudTap);
    return btn;
  }

  function layoutClouds(){
    const w = scene.clientWidth;
    const h = scene.clientHeight;
    const names = ['Пух', 'Блик', 'Лайт', 'Нимб', 'Флоу', 'Мист', 'Зефир', 'Глим', 'Луна', 'Дрифт', 'Скай', 'Сноу'];

    scene.innerHTML = '';
    for(let i = 0; i < CLOUD_COUNT; i++){
      const cloud = createCloud(names[i % names.length]);
      const size = int(76, 144);
      const left = rand(4, Math.max(6, w - size - 8));
      const top = rand(8, Math.max(10, h - size * 0.75 - 8));
      cloud.style.width = `${size}px`;
      cloud.style.height = `${Math.round(size * 0.62)}px`;
      cloud.style.left = `${left}px`;
      cloud.style.top = `${top}px`;
      cloud.style.fontSize = `${Math.round(size / 7.4)}px`;
      cloud.dataset.baseDx = String(int(4, 18));
      cloud.dataset.baseDur = String(rand(6.5, 14).toFixed(2));
      cloud.style.setProperty('--delay', `${rand(0, 2.5).toFixed(2)}s`);
      applyCloudDifficulty(cloud);
      cloudTone(cloud);
      scene.appendChild(cloud);
    }
  }

  function resetCombo(){
    combo = 0;
    lastClickTs = 0;
    updateHud();
  }

  shuffleBtn.addEventListener('click', () => {
    resetCombo();
    roundEndsAt = 0;
    againBtn.classList.add('hidden');
    layoutClouds();
    updateRoundHud();
    liveRegion.textContent = 'Облака перемешаны';
  });

  againBtn.addEventListener('click', () => {
    resetCombo();
    roundEndsAt = 0;
    roundBursts = 0;
    roundWon = false;
    againBtn.classList.add('hidden');
    updateRoundHud();
    liveRegion.textContent = 'Новый раунд: лопни 5 облаков за 30 секунд';
  });

  soundBtn.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    if (soundEnabled) ensureAudio();
    soundBtn.textContent = soundEnabled ? '🔊 Sound On' : '🔇 Sound Off';
    soundBtn.setAttribute('aria-pressed', soundEnabled ? 'true' : 'false');
    liveRegion.textContent = soundEnabled ? 'Звук включён' : 'Звук выключен';
  });

  function handleResetBest(){
    resetBestHoldTimer = null;
    best = 0;
    localStorage.setItem(BEST_KEY, '0');
    updateHud();
    liveRegion.textContent = 'Рекорд сброшен';
  }

  resetBestBtn.addEventListener('pointerdown', () => {
    resetBestHoldTimer = setTimeout(handleResetBest, 900);
  });
  ['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
    resetBestBtn.addEventListener(evt, () => {
      if (resetBestHoldTimer) {
        clearTimeout(resetBestHoldTimer);
        resetBestHoldTimer = null;
      }
    });
  });
  resetBestBtn.addEventListener('click', () => {
    liveRegion.textContent = 'Удерживай Reset Best, чтобы сбросить рекорд';
  });

  window.addEventListener('resize', () => layoutClouds());
  setInterval(() => {
    if (combo > 0 && performance.now() - lastClickTs > getComboWindowMs()) {
      combo = 0;
      updateHud();
    }
    if (roundEndsAt && performance.now() >= roundEndsAt) finishRound();
    updateRoundHud();
    scene.querySelectorAll('.cloud:not(.hidden):not(.bursting)').forEach(applyCloudDifficulty);
  }, 300);

  updateHud();
  updateRoundHud();
  layoutClouds();
})();
</script>
</body>
</html>
